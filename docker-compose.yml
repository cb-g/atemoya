services:
  atemoya:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: 1000
        USER_GID: 1000
    image: atemoya:latest
    container_name: atemoya

    # DNS configuration (fixes resolution issues)
    dns:
      - 8.8.8.8
      - 8.8.4.4

    # Mount source code and output directories
    volumes:
      # Source code (for development)
      - .:/app

      # Preserve Python venv created during build
      - /app/.venv

      # Persist output directories - Pricing models
      - ./pricing/regime_downside/output:/app/pricing/regime_downside/output
      - ./pricing/regime_downside/data:/app/pricing/regime_downside/data
      - ./pricing/regime_downside/log:/app/pricing/regime_downside/log
      - ./pricing/earnings_vol/data:/app/pricing/earnings_vol/data
      - ./pricing/earnings_vol/output:/app/pricing/earnings_vol/output
      - ./pricing/skew_verticals/data:/app/pricing/skew_verticals/data
      - ./pricing/skew_verticals/output:/app/pricing/skew_verticals/output
      - ./pricing/pre_earnings_straddle/data:/app/pricing/pre_earnings_straddle/data
      - ./pricing/pre_earnings_straddle/output:/app/pricing/pre_earnings_straddle/output
      - ./pricing/forward_factor/data:/app/pricing/forward_factor/data
      - ./pricing/forward_factor/output:/app/pricing/forward_factor/output

      # Persist output directories - Valuation models
      - ./valuation/dcf_deterministic/output:/app/valuation/dcf_deterministic/output
      - ./valuation/dcf_deterministic/log:/app/valuation/dcf_deterministic/log
      - ./valuation/dcf_probabilistic/output:/app/valuation/dcf_probabilistic/output
      - ./valuation/dcf_probabilistic/log:/app/valuation/dcf_probabilistic/log

      # Python cache (for faster uv operations)
      - uv_cache:/home/atemoya/.cache/uv

    # Load user environment (SEC_EDGAR_IDENTITY, FRED_API_KEY, etc.)
    env_file:
      - path: .env
        required: false

    # Environment variables
    environment:
      - OPAM_SWITCH_PREFIX=/home/atemoya/.opam/atemoya-build
      - PATH=/home/atemoya/.local/bin:/home/atemoya/.opam/atemoya-build/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - UV_LINK_MODE=copy

    # Keep container running for interactive use
    stdin_open: true
    tty: true

    # Working directory
    working_dir: /app

    # Start cron daemon, load project crontab if present, then interactive shell
    command: /bin/bash -c "sudo cron; if [ -f /app/crontab ]; then crontab /app/crontab; fi; eval $$(opam env) && exec /bin/bash"

# Named volumes for caching
volumes:
  uv_cache:
    name: atemoya_uv_cache
